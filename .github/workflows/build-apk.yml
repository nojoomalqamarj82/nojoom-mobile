name: Build Nojoom Mobile APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'ci-logs/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        id: build
        run: |
          set +e
          gradle assembleDebug --stacktrace > build_output.log 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Report build output to summary
        if: always()
        run: |
          echo "## Gradle build output (last 200 lines)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 200 build_output.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Commit build log for inspection
        if: always()
        run: |
          mkdir -p ci-logs
          cp build_output.log ci-logs/last_build.log
          git config user.email "ci@nojoom.local"
          git config user.name "Nojoom CI"
          git add ci-logs/last_build.log
          git commit -m "CI: update build log [skip ci]" || echo "no changes"
          git push origin HEAD:main || echo "push failed"

      - name: Fail job if build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1

      - name: Upload APK artifact
        if: steps.build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: nojoom-mobile-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
